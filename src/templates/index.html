<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wine Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🍷 Wine Quality Prediction</h2>

        <form id="wineForm">

            <div class="row">

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="fixed_acidity" placeholder="Fixed Acidity" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="volatile_acidity" placeholder="Volatile Acidity" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="citric_acid" placeholder="Citric Acid" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="residual_sugar" placeholder="Residual Sugar" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="chlorides" placeholder="Chlorides" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="free_sulfur_dioxide" placeholder="Free SO2" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="total_sulfur_dioxide" placeholder="Total SO2" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="density" placeholder="Density" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="pH" placeholder="pH" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="sulphates" placeholder="Sulphates" required>
                </div>

                <div class="col-md-4 mb-2">
                    <input class="form-control" name="alcohol" placeholder="Alcohol" required>
                </div>

                <div class="col-md-4 mb-2">
                    <select class="form-control" name="type">
                        <option value="0">Red</option>
                        <option value="1">White</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                🔮 Predict
            </button>

        </form>

        <div class="alert alert-info mt-4 text-center d-none" id="result"></div>

    </div>
</div>

<script>
document.getElementById("wineForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    // convert strings → numbers
    for (let key in data) {
        if (key !== "type") {
            data[key] = parseFloat(data[key]);
        } else {
            data[key] = parseInt(data[key]);
        }
    }

    const response = await fetch("http://localhost:8000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const resultDiv = document.getElementById("result");
    resultDiv.classList.remove("d-none");
    resultDiv.innerHTML = "🍷 Prediction: <b>" + result.prediction + "</b>";
});
</script>

</body>
</html>
